<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模試時間割作成アプリ (タイムキーパー連携版)</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
            
            --color-common: #fef08a;
            --color-day: #bfdbfe;
            --color-period: #bbf7d0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1, h2, h3, h4 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .control-panel {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 30px;
        }

        .section-common {
            background-color: rgba(254, 240, 138, 0.2);
            border: 1px solid #fef08a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .section-day-base {
            background-color: rgba(191, 219, 254, 0.3);
            border: 1px solid #bfdbfe;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input[type="text"], input[type="date"], input[type="time"], input[type="number"], select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fff;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-secondary { background-color: #64748b; }
        .btn-secondary:hover { background-color: #475569; }

        .period-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
            background-color: rgba(187, 247, 208, 0.4);
            border: 1px solid #bbf7d0;
            padding: 10px;
            border-radius: 6px;
        }

        /* 連携データエリアのスタイル */
        .export-section {
            background-color: #f0fdf4;
            border: 2px solid #bbf7d0;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }

        .preview-area {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow-x: auto;
            margin-top: 30px;
        }

        .timetable-print-wrapper {
            background: white;
            color: black;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .timetable-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 3px double #000;
            padding-bottom: 8px;
        }

        .days-container {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .day-column {
            flex: 1;
            max-width: 500px;
            border: 2px solid #000;
            border-radius: 4px;
            padding: 15px;
            background: #fff;
        }

        .day-title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .slot {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
            background-color: #fff;
        }
        .slot-subject {
            font-weight: bold;
            font-size: 16px;
        }
        .slot-time {
            font-size: 14px;
            margin-top: 4px;
        }

        .slot-break {
            text-align: center;
            font-size: 12px;
            color: #444;
            padding: 6px;
            background: #f8fafc;
            border: 1px dashed #64748b;
            margin: 2px 0;
            font-weight: bold;
        }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .control-panel, .export-section { display: none !important; }
            .preview-area { padding: 0; box-shadow: none; border-radius: 0; display: flex; justify-content: center; width: 100%; }
            .timetable-print-wrapper { width: 92% !important; height: auto !important; margin-top: 20px !important; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="control-panel">
        <h2>模試時間割 作成パネル</h2>
        
        <div class="section-common">
            <h4>💡 共通設定</h4>
            <div class="grid-2">
                <div class="form-group">
                    <label for="exam-input">試験名入力</label>
                    <input type="text" id="exam-input" list="exam-list" placeholder="例：第1回 全統共通テスト模試">
                    <datalist id="exam-list"></datalist>
                    <button class="btn btn-secondary" style="margin-top: 5px; padding: 4px 10px; font-size: 12px;" onclick="saveExamName()">この試験名をリストに保存</button>
                </div>
                <div class="form-group">
                    <label for="break-time">共通休み時間 (分)</label>
                    <input type="number" id="break-time" value="10" min="0">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="layout-orientation">表示・印刷の向き</label>
                    <select id="layout-orientation" onchange="updateLayout()">
                        <option value="landscape">横並び (横向き印刷向け)</option>
                        <option value="portrait">縦並び (縦向き印刷向け)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="paper-size">用紙サイズ</label>
                    <select id="paper-size" onchange="updateLayout()">
                        <option value="A4">A4</option>
                        <option value="B4">B4</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="days-config-container"></div>
        
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="btn btn-secondary" onclick="addDayConfig()">＋ 日程を追加</button>
            <button class="btn" style="background-color: #10b981;" onclick="generateTimetable()">時間割を生成・更新</button>
            <button class="btn btn-danger" style="margin-left: auto;" onclick="window.print()">印刷 / PDFとして保存</button>
        </div>
    </div>

    <div class="export-section">
        <h3>⏱️ タイムキーパー自動連携用データ</h3>
        <p style="font-size: 13px; margin-bottom: 10px; color: #1e293b;">
            時間割を生成すると、ここに連携用のデータが作られます。対象の日程を選んで保存するか、コードをコピーしてタイムキーパーに読み込ませてください。
        </p>
        <div class="form-group" style="max-width: 300px;">
            <label for="export-day-select">タイマー化する日程を選択：</label>
            <select id="export-day-select" onchange="updateExportData()"></select>
        </div>
        <textarea id="export-code" style="width:100%; height:80px; font-family:monospace; font-size:12px; padding:10px; border:1px solid #cbd5e1; border-radius:6px; background:#fff; margin-bottom:10px;" readonly></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" style="background-color: #2563eb;" onclick="copyExportCode()">📋 連携コードをコピー</button>
            <button class="btn btn-secondary" style="background-color: #059669;" onclick="downloadConfigFile()">💾 設定ファイル(.json)をダウンロードしてUSBへ保存</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="timetable-print" class="timetable-print-wrapper">
            <div id="print-title" class="timetable-title">模試時間割</div>
            <div id="print-days-container" class="days-container"></div>
        </div>
    </div>

</div>

<script>
    let savedExams = JSON.parse(localStorage.getItem('savedExams')) || ["第1回 共通テスト模試", "第1回 記述模試"];
    let generatedDataLog = []; // タイムキーパー用に一時保存する配列

    function updateExamList() {
        const datalist = document.getElementById('exam-list');
        datalist.innerHTML = '';
        savedExams.forEach(exam => {
            const option = document.createElement('option');
            option.value = exam;
            datalist.appendChild(option);
        });
    }

    function saveExamName() {
        const input = document.getElementById('exam-input').value.trim();
        if (input && !savedExams.includes(input)) {
            savedExams.push(input);
            localStorage.setItem('savedExams', JSON.stringify(savedExams));
            updateExamList();
            alert('試験名を保存しました。');
        }
    }

    let dayCount = 0;

    function addDayConfig() {
        dayCount++;
        const container = document.getElementById('days-config-container');
        const dayDiv = document.createElement('div');
        dayDiv.id = `day-config-${dayCount}`;
        dayDiv.style = "border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #fff;";
        
        const today = new Date().toISOString().split('T')[0];

        dayDiv.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4 style="margin:0; color: var(--primary-color);">📅 日程 #${dayCount} の設定</h4>
                <button class="btn btn-danger" style="padding: 2px 8px; font-size: 12px;" onclick="removeDayConfig(${dayCount})">日程削除</button>
            </div>
            
            <div class="section-day-base">
                <div class="grid-3">
                    <div class="form-group">
                        <label>日付選択</label>
                        <input type="date" class="day-date" value="${today}">
                    </div>
                    <div class="form-group">
                        <label>集合時間</label>
                        <input type="time" class="day-gather-time" value="08:30">
                    </div>
                    <div class="form-group">
                        <label>1コマ目 開始時間</label>
                        <input type="time" class="day-start-time" value="09:00">
                    </div>
                </div>
            </div>

            <div class="periods-container" id="periods-container-${dayCount}"></div>
            <button class="btn btn-secondary" style="padding: 4px 12px; font-size: 12px; margin-top: 5px; background-color: #059669;" onclick="addPeriodRow(${dayCount})">＋ 教科(コマ)を追加</button>
        `;
        
        container.appendChild(dayDiv);
        addPeriodRow(dayCount, "国語", 80);
        addPeriodRow(dayCount, "数学", 70);
        addPeriodRow(dayCount, "英語", 80);
    }

    function removeDayConfig(id) {
        const el = document.getElementById(`day-config-${id}`);
        if(el) el.remove();
    }

    function addPeriodRow(dayId, subject = "", duration = 60) {
        const pContainer = document.getElementById('periods-container-' + dayId);
        const row = document.createElement('div');
        row.className = 'period-row';
        row.innerHTML = `
            <span style="font-weight:bold; font-size:12px; color:#047857;">教科：</span>
            <input type="text" class="p-subject" placeholder="例: 英語" value="${subject}" style="flex: 2;">
            <span style="font-weight:bold; font-size:12px; color:#047857; margin-left:10px;">試験時間：</span>
            <input type="number" class="p-duration" placeholder="分" value="${duration}" style="flex: 1; max-width:80px;"> 
            <span style="font-size:14px; font-weight:bold;">分</span>
            <button class="btn btn-danger" style="padding: 4px 8px; margin-left:auto;" onclick="this.parentElement.remove()">✕</button>
        `;
        pContainer.appendChild(row);
    }

    function addMinutes(timeStr, minutes) {
        let [hh, mm] = timeStr.split(':').map(Number);
        let date = new Date();
        date.setHours(hh, mm, 0, 0);
        date.setMinutes(date.getMinutes() + minutes);
        return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }

    function formatJapaneseDateWithWeek(dateStr) {
        if(!dateStr) return "";
        const dateObj = new Date(dateStr);
        if(isNaN(dateObj.getTime())) return dateStr;

        const month = dateObj.getMonth() + 1;
        const date = dateObj.getDate();
        const weeks = ["日", "月", "火", "水", "木", "金", "土"];
        const weekStr = weeks[dateObj.getDay()];

        return `${month}月${date}日 (${weekStr})`;
    }

    function generateTimetable() {
        const examName = document.getElementById('exam-input').value || "模試時間割";
        document.getElementById('print-title').innerText = examName;
        
        const breakTime = parseInt(document.getElementById('break-time').value) || 0;
        const printDaysContainer = document.getElementById('print-days-container');
        printDaysContainer.innerHTML = ''; 

        const dayBoxes = document.querySelectorAll('[id^="day-config-"]');
        
        generatedDataLog = [];
        const selectEl = document.getElementById('export-day-select');
        selectEl.innerHTML = '';

        dayBoxes.forEach((box, dIdx) => {
            const rawDate = box.querySelector('.day-date').value;
            const dayLabel = formatJapaneseDateWithWeek(rawDate) || `日程 #${dIdx+1}`;
            const gatherTime = box.querySelector('.day-gather-time').value || "08:30";
            let currentTime = box.querySelector('.day-start-time').value || "09:00";
            
            const dayColumn = document.createElement('div');
            dayColumn.className = 'day-column';
            
            let html = `<div class="day-title">${dayLabel}</div>`;
            html += `<div class="timeline">`;
            
            html += `
                <div class="slot" style="background: #f8fafc; border-style: dashed; border-color: #64748b;">
                    <div class="slot-subject" style="font-size:14px; color:#475569;">集合・出欠確認</div>
                    <div class="slot-time">${gatherTime}</div>
                </div>
            `;

            // タイムキーパー用の配列を構築
            let currentDayTimetable = [];

            const periods = box.querySelectorAll('.period-row');
            periods.forEach((pRow, index) => {
                const subject = pRow.querySelector('.p-subject').value || "未定";
                const duration = parseInt(pRow.querySelector('.p-duration').value) || 0;
                
                if (index > 0 && breakTime > 0) {
                    html += `<div class="slot-break">休み時間 (${breakTime}分)</div>`;
                    currentTime = addMinutes(currentTime, breakTime);
                }
                
                const startTime = currentTime;
                const endTime = addMinutes(startTime, duration);
                currentTime = endTime; 

                html += `
                    <div class="slot">
                        <div class="slot-subject">${subject} <span style="font-size:14px; font-weight:normal;">(${duration}分)</span></div>
                        <div class="slot-time">${startTime} ～ ${endTime}</div>
                    </div>
                `;

                // 配列にオブジェクトを格納 (タイムキーパーの内部構造に互換)
                currentDayTimetable.push({
                    id: index + 1,
                    name: subject,
                    duration: duration
                });
            });
            
            html += `</div>`;
            dayColumn.innerHTML = html;
            printDaysContainer.appendChild(dayColumn);

            // 連携用データを記録
            generatedDataLog.push({
                dayLabel: dayLabel,
                timetable: currentDayTimetable,
                breakDuration: breakTime
            });

            // セレクトボックスに選択肢を追加
            const opt = document.createElement('option');
            opt.value = dIdx;
            opt.textContent = dayLabel;
            selectEl.appendChild(opt);
        });

        updateLayout();
        updateExportData();
    }

    function updateExportData() {
        const selectEl = document.getElementById('export-day-select');
        const codeTextArea = document.getElementById('export-code');
        if (selectEl.value === "" || !generatedDataLog[selectEl.value]) {
            codeTextArea.value = "";
            return;
        }
        const activeData = generatedDataLog[selectEl.value];
        // JSON文字列化してテキストエリアに出力
        codeTextArea.value = JSON.stringify(activeData);
    }

    function copyExportCode() {
        const codeTextArea = document.getElementById('export-code');
        if (!codeTextArea.value) return alert('先に「時間割を生成・更新」してください。');
        codeTextArea.select();
        document.execCommand('copy');
        alert('連携コードをクリップボードにコピーしました！\nタイムキーパー側で貼り付けてください。');
    }

    function downloadConfigFile() {
        const codeTextArea = document.getElementById('export-code');
        const selectEl = document.getElementById('export-day-select');
        if (!codeTextArea.value) return alert('先に「時間割を生成・更新」してください。');
        
        const dayLabel = selectEl.options[selectEl.selectedIndex].text;
        const blob = new Blob([codeTextArea.value], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `timer_config_${dayLabel}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function updateLayout() {
        const orientation = document.getElementById('layout-orientation').value;
        const paperSize = document.getElementById('paper-size').value;
        const container = document.getElementById('print-days-container');

        if (orientation === 'landscape') {
            container.style.flexDirection = 'row';
        } else {
            container.style.flexDirection = 'column';
        }

        let printStyles = document.getElementById('print-page-styles');
        if (!printStyles) {
            printStyles = document.createElement('style');
            printStyles.id = 'print-page-styles';
            document.head.appendChild(printStyles);
        }
        
        printStyles.innerHTML = `
            @media print {
                @page {
                    size: ${paperSize} ${orientation};
                    margin: 15mm 20mm;
                }
            }
        `;
    }

    window.onload = function() {
        updateExamList();
        addDayConfig(); 
        generateTimetable(); 
    };
</script>
</body>
</html>
